<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toxc report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar-w:280px;--mono:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}

[data-theme="dark"]{
  --bg:#09090b;--bg2:#0f0f12;--surface:#141418;--surface-h:#1c1c22;--surface-a:#26262c;
  --border:#27272a;--border2:#333;
  --text:#fafafa;--text2:#a1a1aa;--muted:#52525b;
  --red:#ef4444;--red-d:rgba(239,68,68,.14);
  --yel:#f59e0b;--yel-d:rgba(245,158,11,.12);
  --grn:#22c55e;--grn-d:rgba(34,197,94,.1);
  --blu:#3b82f6;--blu-d:rgba(59,130,246,.1);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 4px 14px rgba(0,0,0,.4);
}
[data-theme="light"]{
  --bg:#f8fafc;--bg2:#f1f5f9;--surface:#fff;--surface-h:#f1f5f9;--surface-a:#e2e8f0;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--muted:#94a3b8;
  --red:#dc2626;--red-d:rgba(220,38,38,.07);
  --yel:#d97706;--yel-d:rgba(217,119,6,.07);
  --grn:#16a34a;--grn-d:rgba(22,163,74,.07);
  --blu:#2563eb;--blu-d:rgba(37,99,235,.06);
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 14px rgba(0,0,0,.08);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;font-size:14px;line-height:1.6}

/* ── Layout ────────────────────────────────────────────── */
.layout{display:flex;min-height:100vh}
.sidebar{position:sticky;top:0;width:var(--sidebar-w);height:100vh;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);padding:1.25rem;flex-shrink:0;z-index:10;scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:flex;flex-direction:column;gap:1rem}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.main{flex:1;padding:2rem 2.5rem;min-width:0}

/* ── Sidebar ───────────────────────────────────────────── */
.sb-brand{display:flex;align-items:center;justify-content:space-between;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.sb-brand h1{font-size:.85rem;font-weight:700;letter-spacing:.06em;font-family:var(--mono)}
.sb-brand .sb-file{font-size:.65rem;color:var(--muted);margin-top:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.theme-btn{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s,color .15s}
.theme-btn:hover{background:var(--surface-h);color:var(--text)}

/* ── Monetization Risk Widget ──────────────────────────── */
.sb-mono-risk{padding:.65rem 0;border-bottom:1px solid var(--border)}
.sb-mono-risk h3{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.45rem}
.mono-risk-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.risk-pill{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px}
.rp-high{background:var(--red-d);color:var(--red)}
.rp-medium{background:var(--yel-d);color:var(--yel)}
.rp-low{background:var(--grn-d);color:var(--grn)}
.mono-ad-ver{font-size:.72rem;color:var(--text2)}

.sb-score{text-align:center;padding:1rem 0}
.sb-score .big{font-size:2.8rem;font-weight:800;font-family:var(--mono);line-height:1;letter-spacing:-.03em}
.sb-score .verdict{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;margin-top:.4rem;font-weight:600}
.sb-breakdown{display:flex;justify-content:center;gap:.5rem;margin-top:.65rem;flex-wrap:wrap}
.sbb{text-align:center;padding:.3rem .45rem;background:var(--bg2);border-radius:5px;min-width:52px}
.sbb .sbv{font-size:.75rem;font-weight:700;font-family:var(--mono)}
.sbb .sbl{font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}

.sb-dims{padding-top:.5rem;border-top:1px solid var(--border)}
.sb-dims h3,.sb-nav h3,.sb-moments h3,.sb-stats-title{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.45rem}
.dim-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
.dim-label{width:62px;font-size:.7rem;color:var(--text2);text-transform:capitalize}
.dim-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.dim-fill{height:100%;border-radius:2px;transition:width .4s}
.dim-val{width:30px;text-align:right;font-family:var(--mono);font-size:.65rem;color:var(--text2)}

.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;padding-top:.5rem;border-top:1px solid var(--border)}
.sb-stat{text-align:center;padding:.45rem .25rem;background:var(--bg2);border-radius:6px}
.sb-stat .sv{font-size:1rem;font-weight:700;font-family:var(--mono)}
.sb-stat .sl{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}

.sb-nav{padding-top:.5rem;border-top:1px solid var(--border)}
.nav-link{display:block;padding:.3rem .55rem;border-radius:4px;color:var(--text2);text-decoration:none;font-size:.78rem;cursor:pointer;transition:background .12s,color .12s;margin-bottom:1px}
.nav-link:hover{background:var(--surface-h);color:var(--text)}
.nav-link.active{background:var(--surface-a);color:var(--text);font-weight:600}

.sb-moments{padding-top:.5rem;border-top:1px solid var(--border)}
.ml{display:flex;align-items:flex-start;gap:.45rem;padding:.35rem .45rem;border-radius:4px;cursor:pointer;transition:background .12s;margin-bottom:1px}
.ml:hover{background:var(--surface-h)}
.ml.active{background:var(--surface-a)}
.ml-rank{font-family:var(--mono);font-size:.65rem;font-weight:700;min-width:18px;padding-top:1px}
.ml-body{flex:1;min-width:0}
.ml-text{font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml-meta{font-size:.6rem;color:var(--muted);font-family:var(--mono)}

/* ── Main Header ───────────────────────────────────────── */
.main-hdr h1{font-size:1.3rem;font-weight:700}
.main-hdr .meta{color:var(--text2);font-size:.82rem;margin-top:.15rem}
.main-hdr{margin-bottom:2rem}
.yt-thumb{width:100%;border-radius:6px;margin-top:.75rem;display:block;object-fit:cover;aspect-ratio:16/9;max-width:480px}
.yt-channel{font-size:.78rem;color:var(--muted);margin-top:.25rem}

/* ── Section ───────────────────────────────────────────── */
.section{margin-bottom:2.5rem}
.section-hdr{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.7rem;padding-bottom:.35rem;border-bottom:1px solid var(--border)}

/* ── Signals ───────────────────────────────────────────── */
.sig-tier{margin-bottom:.55rem}
.sig-tier-hdr{font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;padding:.22rem .65rem;border-radius:4px 4px 0 0;font-weight:700}
.sig-tier-high .sig-tier-hdr{background:var(--red-d);color:var(--red);border:1px solid rgba(239,68,68,.22);border-bottom:none}
.sig-tier-med .sig-tier-hdr{background:var(--yel-d);color:var(--yel);border:1px solid rgba(245,158,11,.2);border-bottom:none}
.sig-tier-pat .sig-tier-hdr{background:var(--surface);color:var(--text2);border:1px solid var(--border);border-bottom:none}
.sig-full-row{display:flex;align-items:center;justify-content:space-between;padding:.42rem .65rem;font-size:.78rem;border:1px solid;border-top:none;line-height:1.35}
.sig-full-row:last-child{border-radius:0 0 4px 4px}
.sig-tier-high .sig-full-row{background:var(--red-d);border-color:rgba(239,68,68,.22);color:var(--red)}
.sig-tier-med .sig-full-row{background:var(--yel-d);border-color:rgba(245,158,11,.2);color:var(--yel)}
.sig-tier-pat .sig-full-row{background:var(--bg2);border-color:var(--border);color:var(--text2)}
.sig-val{font-family:var(--mono);font-size:.68rem;opacity:.65;margin-left:.5rem;white-space:nowrap}
/* legacy badge (kept for fallback) */
.sig-row{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;padding:.3rem .6rem;border-radius:5px;border:1px solid}
.sig-high{background:var(--red-d);border-color:rgba(239,68,68,.22);color:var(--red)}
.sig-medium{background:var(--yel-d);border-color:rgba(245,158,11,.2);color:var(--yel)}
.sig-low{background:var(--grn-d);border-color:rgba(34,197,94,.2);color:var(--grn)}

/* ── Recommendations ───────────────────────────────────── */
.recs-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1.8rem;box-shadow:var(--shadow)}
.rec{display:flex;gap:.55rem;align-items:flex-start;padding:.35rem 0;font-size:.83rem;line-height:1.45}
.rec+.rec{border-top:1px solid var(--border)}
.rec-icon{flex-shrink:0;padding-top:2px}
.rec-pass{color:var(--grn)}.rec-warning{color:var(--yel)}.rec-edit{color:var(--text2)}
.rec-snippet{font-size:.75rem;color:var(--muted);margin-top:.12rem;font-style:italic}

/* ── Timeline Bars ─────────────────────────────────────── */
.tl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;box-shadow:var(--shadow)}
.tl-bars-outer{position:relative}
.tl-zone7{position:absolute;top:0;left:0;bottom:0;background:var(--red-d);border-right:1px dashed rgba(239,68,68,.35);pointer-events:none;z-index:1;border-radius:3px 0 0 3px}
.tl-bars{display:flex;gap:1px;height:44px;border-radius:4px;overflow:hidden}
.tl-bar{min-width:2px;height:100%;cursor:pointer;transition:opacity .12s,transform .12s;position:relative}
.tl-bar:hover{opacity:1!important;transform:scaleY(1.2);z-index:2}
.tl-labels{display:flex;justify-content:space-between;margin-top:.45rem;font-size:.65rem;font-family:var(--mono);color:var(--muted)}
.tl-legend{display:flex;gap:1rem;margin-top:.5rem;font-size:.65rem;color:var(--muted)}
.tl-legend span{display:flex;align-items:center;gap:.3rem}
.tl-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

/* ── Moment Cards ──────────────────────────────────────── */
.moments{display:flex;flex-direction:column;gap:.65rem}
.mc{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:.9rem 1.1rem;display:flex;gap:.9rem;align-items:flex-start;cursor:pointer;transition:background .12s,box-shadow .12s;box-shadow:var(--shadow)}
.mc:hover{background:var(--surface-h);box-shadow:var(--shadow-lg)}
.mc-rank{font-family:var(--mono);font-size:1.3rem;font-weight:800;line-height:1;min-width:28px}
.mc-body{flex:1;min-width:0}
.mc-top{display:flex;align-items:center;gap:.65rem;margin-bottom:.35rem;flex-wrap:wrap}
.mc-score{font-family:var(--mono);font-weight:700;font-size:.95rem}
.mc-time{font-family:var(--mono);font-size:.7rem;color:var(--muted);background:var(--bg2);padding:.1rem .4rem;border-radius:4px}
.mc-verdict{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.mc-text{color:var(--text2);font-size:.88rem;line-height:1.45}
.mc-chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.45rem}
.chip{display:inline-flex;align-items:center;padding:.12rem .5rem;border-radius:20px;font-size:.65rem;font-family:var(--mono);font-weight:500}

/* ── Sentence Table ────────────────────────────────────── */
.s-table{width:100%;border-collapse:collapse}
.s-table thead th{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:left;padding:.45rem .65rem;border-bottom:1px solid var(--border);white-space:nowrap}
.s-table tbody tr{transition:background .1s}
.s-table tbody tr:hover{background:var(--surface-h)!important}
.col-time{font-family:var(--mono);font-size:.78rem;color:var(--muted);white-space:nowrap;cursor:pointer}
.col-text{max-width:440px;line-height:1.4;color:var(--text2)}
.col-score{font-family:var(--mono);font-weight:700;white-space:nowrap}
.col-sent{font-family:var(--mono);font-size:.82rem}
.col-verd{font-size:.78rem;font-weight:600}

.mini-bar{display:inline-block;width:46px;height:3px;background:var(--border);border-radius:2px;margin-left:5px;vertical-align:middle;position:relative;top:-1px}
.mini-bar-fill{height:100%;border-radius:2px}

/* ── Charts Grid ──────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;box-shadow:var(--shadow);min-width:0}
.chart-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.6rem}
.chart-card svg text{font-family:var(--mono)}

/* ── Distribution ─────────────────────────────────────── */
.dist{display:flex;gap:3px;height:120px}
.dist-col{flex:1;display:flex;flex-direction:column;align-items:center}
.dist-count{font-size:.55rem;color:var(--text2);font-family:var(--mono);height:14px;display:flex;align-items:flex-end}
.dist-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.dist-bar{width:100%;border-radius:3px 3px 0 0;min-height:1px;transition:height .3s}
.dist-label{font-size:.55rem;color:var(--muted);font-family:var(--mono);margin-top:2px}
.dist-col:hover .dist-bar{filter:brightness(1.2)}

/* ── Heatmap ──────────────────────────────────────────── */
.hm-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;box-shadow:var(--shadow)}
.hm-row{display:flex;align-items:center;gap:.5rem;margin-bottom:2px}
.hm-label{width:58px;font-size:.65rem;color:var(--text2);text-align:right;flex-shrink:0}
.hm-cells{display:flex;flex:1;gap:1px}
.hm-cell{flex:1 1 0;min-width:3px;height:20px;border-radius:2px;cursor:pointer;transition:transform .1s}
.hm-cell:hover{transform:scaleY(1.4);z-index:1;filter:brightness(1.3)}
.hm-legend{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;justify-content:flex-end;font-size:.55rem;color:var(--muted);font-family:var(--mono)}
.hm-legend-bar{width:80px;height:6px;border-radius:3px;background:linear-gradient(to right,var(--border),var(--blu),var(--yel),var(--red))}
.hm-time-labels{display:flex;margin-left:66px;margin-top:3px;gap:1px}
.hm-time-labels span{flex:1;font-size:.5rem;color:var(--muted);font-family:var(--mono);text-align:center}

/* ── What to Fix ───────────────────────────────────────── */
.wf-row{display:flex;gap:.6rem;align-items:flex-start;padding:.38rem 0;border-bottom:1px solid var(--border);font-size:.83rem;line-height:1.45}
.wf-row:last-child{border-bottom:none}
.wf-icon{flex-shrink:0;padding-top:1px;font-weight:700;min-width:14px}
.wf-edit{color:var(--blu)}.wf-warn{color:var(--yel)}.wf-pass{color:var(--grn)}.wf-info{color:var(--text2)}
.wf-text{color:var(--text)}
.wf-saves{font-family:var(--mono);font-weight:700;color:var(--grn)}
.wf-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem;font-style:italic}

/* ── Context Check badges ──────────────────────────────── */
.cc-cleared{display:inline-flex;align-items:center;gap:.28rem;font-size:.62rem;font-weight:600;padding:.15rem .45rem;border-radius:4px;background:var(--grn-d);color:var(--grn);border:1px solid rgba(34,197,94,.2)}
.cc-confirmed{display:inline-flex;align-items:center;gap:.28rem;font-size:.62rem;font-weight:600;padding:.15rem .45rem;border-radius:4px;background:var(--red-d);color:var(--red);border:1px solid rgba(239,68,68,.22)}
.cc-intent{font-size:.62rem;color:var(--muted);margin-left:.3rem;text-transform:capitalize}
.rewrite-block{margin-top:.6rem;border-top:1px solid var(--border);padding-top:.6rem;display:flex;flex-direction:column;gap:.4rem}
.rewrite-row{display:flex;align-items:baseline;gap:.5rem;font-size:.8rem}
.rewrite-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);min-width:52px;flex-shrink:0}
.rewrite-text{color:var(--text);line-height:1.4;font-style:italic}
.rewrite-copy{background:none;border:1px solid var(--border);border-radius:4px;padding:.1rem .4rem;font-size:.6rem;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;flex-shrink:0}
.rewrite-copy:hover{background:var(--surface-h);color:var(--text)}
.wf-section-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.45rem 0 .25rem;margin-top:.3rem;border-top:1px solid var(--border)}
.wf-section-lbl:first-child{border-top:none;margin-top:0}
.cc-summary-bar{display:flex;align-items:center;gap:.6rem;background:var(--grn-d);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:.5rem .75rem;margin-bottom:.9rem;font-size:.78rem;color:var(--grn)}
.cc-summary-bar strong{font-family:var(--mono);font-weight:800}

/* ── Highlight flash ───────────────────────────────────── */
@keyframes hl-flash{0%{background:var(--blu-d)}100%{background:transparent}}
.sent-hl{animation:hl-flash 2s ease-out}

/* ── Tooltip ───────────────────────────────────────────── */
.tip{position:fixed;background:var(--surface);border:1px solid var(--border);padding:.45rem .7rem;font-size:.78rem;pointer-events:none;max-width:320px;line-height:1.4;border-radius:6px;display:none;z-index:100;box-shadow:var(--shadow-lg)}

/* ── Channel Risk Profile ──────────────────────────────── */
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.75rem}
.ch-cell{background:var(--bg2);border-radius:6px;padding:.45rem .6rem}
.ch-cell .cv{font-size:.88rem;font-weight:700;font-family:var(--mono)}
.ch-cell .cl{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}
.ch-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.82rem;padding:.28rem 0;border-bottom:1px solid var(--border)}
.ch-row:last-child{border-bottom:none}
.ch-key{color:var(--text2)}
.ch-val{font-family:var(--mono);font-weight:600}
.escalation-box{background:var(--red-d);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:.7rem .9rem;font-size:.8rem;line-height:1.5;color:var(--red);margin-top:.75rem}

/* ── Financial Impact ──────────────────────────────────── */
.fin-scenario{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.9rem}
.fin-tier{background:var(--bg2);border-radius:6px;padding:.65rem .75rem;text-align:center;position:relative}
.fin-tier.active{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow)}
.fin-tier .ft-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.35rem}
.fin-tier .ft-amount{font-size:1.2rem;font-weight:800;font-family:var(--mono);line-height:1}
.fin-tier .ft-note{font-size:.6rem;color:var(--muted);margin-top:.2rem}
.fin-tier .ft-arrow{position:absolute;top:.5rem;right:.5rem;font-size:.65rem;color:var(--muted)}
.fin-rows{margin-bottom:.75rem}
.fin-row{display:flex;align-items:baseline;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.83rem}
.fin-row:last-child{border-bottom:none}
.fr-label{color:var(--text2)}
.fr-val{font-family:var(--mono);font-weight:700}

/* ── Consequence Breakdown ─────────────────────────────── */
.cons-row{display:flex;align-items:center;justify-content:space-between;padding:.38rem 0;border-bottom:1px solid var(--border);font-size:.83rem}
.cons-row:last-child{border-bottom:none}
.cons-label{color:var(--text2)}
.cons-val{font-family:var(--mono);font-size:.78rem;font-weight:700;padding:.15rem .5rem;border-radius:4px}
.cv-high{background:var(--red-d);color:var(--red)}
.cv-medium{background:var(--yel-d);color:var(--yel)}
.cv-low{background:var(--grn-d);color:var(--grn)}

/* ── Tabs ──────────────────────────────────────────────── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:2rem;position:sticky;top:0;z-index:5;background:var(--bg);padding-top:.65rem}
.tab-btn{padding:.5rem 1.25rem;font-size:.8rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;letter-spacing:.02em}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--blu)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Hero Cards ────────────────────────────────────────── */
.hero-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:2rem}

details.acc>summary{list-style:none;cursor:pointer;font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding-bottom:.35rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color .12s}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary .acc-toggle{font-size:1rem;font-weight:300;opacity:.45;transition:transform .2s;display:inline-block;line-height:1}
details.acc[open]>summary .acc-toggle{transform:rotate(45deg)}
details.acc>summary:hover{color:var(--text2)}
details.acc[open]>summary{margin-bottom:.7rem}
.acc-body{animation:acc-in .15s ease-out}
@keyframes acc-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── Sentence Table: sticky headers & zebra ────────────── */
.s-table-wrap{overflow-x:auto}
.s-table thead th{position:sticky;top:0;background:var(--surface-h);z-index:3}
.s-table tbody tr:nth-child(even){background:var(--bg2)}
.s-table td{padding:.6rem .65rem;border-bottom:1px solid var(--border);vertical-align:top}

/* ── Responsive ────────────────────────────────────────── */
@media(max-width:860px){

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
}

/* ── Navigation ───────────────────────────────────────── */
function scrollToSent(idx){
  switchTab('transcript');
  setTimeout(function(){
    const el=document.getElementById('sent-'+idx);
    if(!el)return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.remove('sent-hl');
    void el.offsetWidth;
    el.classList.add('sent-hl');
  },50);
}
function scrollToSec(id){
  const tab=SEC_TAB[id];
  if(tab)switchTab(tab);
  const el=document.getElementById(id);
  if(!el)return;
  const det=el.closest('details.acc');
  if(det&&!det.open)det.open=true;
  setTimeout(()=>el.scrollIntoView({behavior:'smooth'}),tab?60:0);
}

/* ── Score Breakdown ──────────────────────────────────── */
function renderScoreBreakdown(b){
  function pill(label,val,tip){
    return '<div class="sbb" title="'+tip+'"><div class="sbv" style="color:'+tc(val)+'">'+val.toFixed(2)+'</div><div class="sbl">'+label+'</div></div>';
  }
  return '<div class="sb-breakdown">'
    +pill('Density',b.density,'Length-weighted mean toxicity across all sentences (25%)')
    +pill('Peak',b.peak,'Mean of top 5% most toxic sentences (50%)')
    +pill('Rate',b.rate,'Fraction of sentences classified Toxic >=0.7 (25%)')
    +'</div>';
}

/* ── Hero Cards ───────────────────────────────────────── */
function renderHero(R){
  const O=R.overall;
  const M=R.monetization||{};
  const rl=M.risk_level||'';
  const flaggedCount=R.sentences.filter(s=>s.toxicity>=0.7).length;
  const flaggedPct=R.sentences.length?((flaggedCount/R.sentences.length)*100).toFixed(0):0;
  const rlColor=rl==='HIGH'?'var(--red)':rl==='MEDIUM'?'var(--yel)':'var(--grn)';
  const SCORE_IC='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>';
  const AD_IC='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>';
  const FLAG_IC='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>';
  const SENT_IC='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>';
  function card(ic,val,valColor,label,sub){
    return`<div class="hero-card"><div class="hero-ic">${ic}</div><div class="hero-val" style="color:${valColor}">${val}</div><div class="hero-label">${label}</div>${sub?`<div class="hero-sub">${sub}</div>`:''}</div>`;
  }
  const CC=R.context_check||{};
  const hasCc=CC.ran&&CC.checked>0;
  const CC_IC='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>';

  // Dynamic grid: 4 cards normally, 5 when context check ran
  const cols=hasCc?5:4;
  let cards=card(SCORE_IC,O.toxicity.toFixed(2),vc(O.verdict),'Toxicity Score',O.verdict);
  if(rl)cards+=card(AD_IC,rl,rlColor,'Ad Safety',M.ad_verdict||'');
  cards+=card(FLAG_IC,String(flaggedCount),flaggedCount>0?'var(--red)':'var(--grn)','Flagged Sentences',flaggedPct+'% of total');
  cards+=card(SENT_IC,sign(O.sentiment),sc(O.sentiment),'Avg Sentiment',O.sentiment>0.05?'Positive':O.sentiment<-0.05?'Negative':'Neutral');
  if(hasCc){
    const clearedColor=CC.cleared>0?'var(--grn)':'var(--text2)';
    cards+=card(CC_IC,`${CC.cleared}/${CC.checked}`,clearedColor,'Context Cleared',`${CC.confirmed} genuine · ${CC.cleared} false pos`);
  }
  return`<div class="hero-cards" style="grid-template-columns:repeat(${cols},1fr)">${cards}</div>`;
}

/* ── Sidebar ──────────────────────────────────────────── */
function renderSidebar(R){
  const O=R.overall;
  const ovc=vc(O.verdict);
  const M=R.monetization||{};
  const rl=M.risk_level||'';

  /* monetization risk widget */
  let monoHtml='';
  if(rl){
    const rpc=rl==='HIGH'?'rp-high':rl==='MEDIUM'?'rp-medium':'rp-low';
    monoHtml='<div class="sb-mono-risk"><h3>Ad Safety</h3>'
      +'<div class="mono-risk-row"><span class="risk-pill '+rpc+'">'+rl+'</span></div>'
      +(M.ad_verdict?'<div class="mono-ad-ver">'+M.ad_verdict+'</div>':'')
      +'</div>';
  }

  /* dimension mini-bars */
  let dimHtml='';
  const dims=O.dimensions||{};
  if(Object.keys(dims).length){
    const labels={insult:'Insult',obscene:'Obscene',threat:'Threat',identity_attack:'Identity',severe_toxicity:'Severe'};
    const sorted=Object.entries(dims).sort(function(a,b){return b[1]-a[1]});
    dimHtml='<div class="sb-dims"><h3>Dimensions</h3>'+sorted.map(function(e){
      var k=e[0],v=e[1];
      return '<div class="dim-row">'
        +'<span class="dim-label">'+(labels[k]||k)+'</span>'
        +'<div class="dim-track"><span class="dim-fill" style="width:'+(v*100).toFixed(1)+'%;background:'+tc(v)+'"></span></div>'
        +'<span class="dim-val" style="color:'+tc(v)+'">'+v.toFixed(2)+'</span></div>';
    }).join('')+'</div>';
  }

  /* moment nav */
  const top_toxic=R.top_toxic||[...R.sentences].sort(function(a,b){return b.toxicity-a.toxicity}).slice(0,5);
  const moments=top_toxic.filter(function(s){return s.toxicity>0}).slice(0,5);
  const momentHtml=moments.map(function(s,i){
    const idx=s.idx!=null?s.idx:R.sentences.findIndex(function(x){return x.start===s.start&&x.text===s.text});
    const preview=s.text.length>28?s.text.slice(0,28)+'\u2026':s.text;
    return '<div class="ml" onclick="scrollToSent('+idx+')" data-midx="'+idx+'">'
      +'<span class="ml-rank" style="color:'+tc(s.toxicity)+'">#'+(i+1)+'</span>'
      +'<div class="ml-body"><div class="ml-text">'+preview+'</div>'
      +'<div class="ml-meta">'+fmt(s.start)+' \u00b7 <span style="color:'+tc(s.toxicity)+'">'+s.toxicity.toFixed(2)+'</span></div></div></div>';
  }).join('');

  const displayName=(R.youtube&&R.youtube.title)?R.youtube.title:R.audio;

  return '<div class="sidebar">'
    +'<div class="sb-brand"><div><h1>toxc</h1><div class="sb-file" title="'+displayName+'">'+displayName+'</div></div>'
    +'<button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">'+SUN+'</button></div>'

    +monoHtml

    +'<div class="sb-score"><div class="big" style="color:'+ovc+'">'+O.toxicity.toFixed(2)+'</div>'
    +'<div class="verdict" style="color:'+ovc+'">'+O.verdict+'</div>'
    +(O.score_breakdown?renderScoreBreakdown(O.score_breakdown):'')
    +'</div>'

    +dimHtml

    +'<div class="sb-stats"><h3 class="sb-stats-title" style="grid-column:1/-1">Stats</h3>'
    +'<div class="sb-stat"><div class="sv" style="color:var(--red)">'+O.toxic_count+'</div><div class="sl">Toxic</div></div>'
    +'<div class="sb-stat"><div class="sv">'+O.sentence_count+'</div><div class="sl">Sentences</div></div>'
    +'<div class="sb-stat"><div class="sv" style="color:'+sc(O.sentiment)+'">'+sign(O.sentiment)+'</div><div class="sl">Sentiment</div></div>'
    +'<div class="sb-stat"><div class="sv" style="color:var(--muted)">'+fmt(R.duration)+'</div><div class="sl">Duration</div></div>'
    +'</div>'

    +'<div class="sb-nav"><h3>Sections</h3>'
    +(R.channel?'<a class="nav-link" data-sec="sec-channel" onclick="scrollToSec(\'sec-channel\')">Channel Profile</a>'  :'')
    +(R.channel&&R.channel.financial&&R.channel.financial.revenue_per_video?'<a class="nav-link" data-sec="sec-finance" onclick="scrollToSec(\'sec-finance\')">Financial Impact</a>':'')
    +'<a class="nav-link" data-sec="sec-consequence" onclick="scrollToSec(\'sec-consequence\')">Consequences</a>'
    +'<a class="nav-link" data-sec="sec-fix" onclick="scrollToSec(\'sec-fix\')">What to Fix</a>'
    +'<a class="nav-link" data-sec="sec-signals" onclick="scrollToSec(\'sec-signals\')">Risk Signals</a>'
    +'<a class="nav-link active" data-sec="sec-tl" onclick="scrollToSec(\'sec-tl\')">Timeline</a>'
    +'<a class="nav-link" data-sec="sec-charts" onclick="scrollToSec(\'sec-charts\')">Analysis</a>'
    +(R.fast?'':'<a class="nav-link" data-sec="sec-hm" onclick="scrollToSec(\'sec-hm\')">Heatmap</a>')
    +'<a class="nav-link" data-sec="sec-mom" onclick="scrollToSec(\'sec-mom\')">Top Moments</a>'
    +'<a class="nav-link" data-sec="sec-all" onclick="scrollToSec(\'sec-all\')">All Sentences</a></div>'

    +'<div class="sb-moments"><h3>Top Moments</h3>'+momentHtml+'</div>'
    +'</div>';
}

/* ── Channel Risk Profile ─────────────────────────────── */
function renderChannelProfile(R){
  const C=R.channel;
  if(!C)return'';

  const strikeCls=C.strike_severity==='high'?'var(--red)':C.strike_severity==='medium'?'var(--yel)':'var(--grn)';
  const F=C.financial||{};

  let statsHtml='';
  if(C.subscribers) statsHtml+=`<div class="ch-cell"><div class="cv">${C.subscribers.toLocaleString()}</div><div class="cl">Subscribers</div></div>`;
  if(C.monthly_views) statsHtml+=`<div class="ch-cell"><div class="cv">${C.monthly_views.toLocaleString()}</div><div class="cl">Monthly views</div></div>`;
  if(C.cpm) statsHtml+=`<div class="ch-cell"><div class="cv">$${C.cpm.toFixed(2)}${C.cpm_estimated?' <span style="font-size:.55rem;color:var(--muted)">est.</span>':''}</div><div class="cl">Avg CPM</div></div>`;
  if(F.views_per_video) statsHtml+=`<div class="ch-cell"><div class="cv">${F.views_per_video.toLocaleString()}</div><div class="cl">Views / video</div></div>`;

  const rows=[
    C.size_label   && ['Channel size',  C.size_label,  'var(--text)'],
    C.category     && ['Category',      C.category,    'var(--text)'],
    C.strike_label && ['Strike status', C.strike_label, strikeCls],
  ].filter(Boolean);

  const rowHtml=rows.map(([k,v,col])=>`<div class="ch-row"><span class="ch-key">${k}</span><span class="ch-val" style="color:${col}">${v}</span></div>`).join('');

  const noteHtml=C.category_note?`<div style="font-size:.75rem;color:var(--text2);margin-top:.5rem">${C.category_note}</div>`:'';
  const escalHtml=C.strike_escalation?`<div class="escalation-box">⚠ ${C.strike_escalation}</div>`:'';

  return`<div class="section" id="sec-channel">`
    +`<div class="section-hdr">Channel Risk Profile</div>`
    +(statsHtml?`<div class="ch-grid">${statsHtml}</div>`:'')
    +`<div class="recs-card" style="margin-bottom:0">${rowHtml}${noteHtml}</div>`
    +escalHtml
    +`</div>`;
}

/* ── Financial Impact ─────────────────────────────────── */
function renderFinancialImpact(R){
  const C=R.channel;
  if(!C)return'';
  const F=C.financial;
  if(!F||!F.revenue_per_video)return'';

  const M=R.monetization||{};
  const rl=M.risk_level||'LOW';
  const fmt$=v=>'$'+v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  // Three-tier scenario overview
  const tiers=[
    {label:'Full monetization',    amount:F.revenue_per_video,   note:'where you want to be', active:rl==='LOW'},
    {label:'Limited ads (yellow)', amount:F.limited_ads_revenue, note:'~70% revenue loss',    active:rl==='MEDIUM'},
    {label:'Demonetized',          amount:0,                     note:'current risk',          active:rl==='HIGH'},
  ];
  const tierHtml=tiers.map(t=>{
    const amtColor=t.active?(rl==='HIGH'?'var(--red)':rl==='MEDIUM'?'var(--yel)':'var(--grn)'):'var(--text2)';
    const arrow=t.active?'<span class="ft-arrow">◀</span>':'';
    return`<div class="fin-tier${t.active?' active':''}">${arrow}`
      +`<div class="ft-label">${t.label}</div>`
      +`<div class="ft-amount" style="color:${amtColor}">${fmt$(t.amount)}</div>`
      +`<div class="ft-note">${t.note}</div>`
      +`</div>`;
  }).join('');

  // Labeled rows matching the spec
  const atRiskColor=F.revenue_at_risk>0?'var(--red)':'var(--grn)';
  const atRiskLabel=rl==='HIGH'?'demonetized':rl==='MEDIUM'?'limited ads':'full monetization';
  const rows=[
    ['Est. revenue / video',       fmt$(F.revenue_per_video),  'var(--text)'],
    ['At current risk level',      `${fmt$(F.projected_revenue)}  (${atRiskLabel})`, atRiskColor],
  ];
  if(F.annual_impact>0) rows.push(['Annual impact if pattern', `-${fmt$(F.annual_impact)}/year`, 'var(--red)']);
  else rows.push(['Annual impact if pattern', 'None — clean upload', 'var(--grn)']);

  const rowHtml=rows.map(([k,v,col])=>`<div class="fin-row"><span class="fr-label">${k}</span><span class="fr-val" style="color:${col}">${v}</span></div>`).join('');

  return`<div class="section" id="sec-finance">`
    +`<div class="section-hdr">Financial Impact</div>`
    +`<div class="fin-scenario">${tierHtml}</div>`
    +`<div class="fin-rows recs-card" style="margin-bottom:0">${rowHtml}</div>`
    +`</div>`;
}

    +`</div>`;
}

/* ── What to Fix ─────────────────────────────────────── */
function renderWhatToFix(R){
  const M=R.monetization||{};
  const recs=M.recommendations||[];
  const rl=M.risk_level||'LOW';
  const CC=R.context_check||{};
  const hasCc=CC.ran;
  const fmt$=v=>'$'+v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  function copyBtn(text){
    const safe=text.replace(/'/g,"\\'");
    return`<button class="rewrite-copy" onclick="navigator.clipboard.writeText('${safe}').then(()=>{this.textContent='✓';setTimeout(()=>this.textContent='Copy',1200)})">Copy</button>`;
  }

  function rewriteBlock(r){
    if(!r.safe_rewrite&&!r.alt_rewrite)return'';
    let html='<div class="rewrite-block">';
    if(r.safe_rewrite) html+=`<div class="rewrite-row"><span class="rewrite-label">Safe</span><span class="rewrite-text">\u201c${r.safe_rewrite}\u201d</span>${copyBtn(r.safe_rewrite)}</div>`;
    if(r.alt_rewrite)  html+=`<div class="rewrite-row"><span class="rewrite-label">Alt</span><span class="rewrite-text">\u201c${r.alt_rewrite}\u201d</span>${copyBtn(r.alt_rewrite)}</div>`;
    html+='</div>';
    return html;
  }

  let html='';

  // ── Context-check summary bar ──────────────────────────
  if(hasCc&&CC.checked>0){
    const net=CC.cleared;
    html+=`<div class="cc-summary-bar">\u2713 Context check ran with ${CC.model} \u00b7 `
      +`<strong>${CC.cleared}</strong> false positive${CC.cleared!==1?'s':''} cleared of ${CC.checked} flagged`
      +(CC.confirmed?` \u00b7 <strong style="color:var(--red)">${CC.confirmed}</strong> confirmed genuine`:'')
      +'</div>';
  }

  // ── Confirmed genuine flags (show rewrites when available) ─
  const editRecs=recs.filter(r=>r.type==='edit');
  let hasConfirmed=false;
  let confirmedHtml='';

  if(hasCc) confirmedHtml+=`<div class="wf-section-lbl">\u26a0 ${editRecs.length} confirmed flag${editRecs.length!==1?'s':''}</div>`;

  editRecs.forEach(r=>{
    hasConfirmed=true;
    const ts=fmt(r.timestamp||0);
    const savesHtml=r.saves?` <span class="wf-saves">\u2192 saves ~${fmt$(r.saves)}/video</span>`:'';
    const intentBadge=r.intent?`<span class="cc-intent">${r.intent}</span>`:'';
    const reasonHtml=r.reason?`<div class="wf-sub">${r.reason}</div>`:'';
    const snippetHtml=(!r.reason&&r.snippet)?`<div class="wf-sub">\u201c${r.snippet}\u2026\u201d</div>`:'';
    confirmedHtml+=`<div class="wf-row">`
      +`<span class="wf-icon wf-warn">\u26a0</span>`
      +`<div><div class="wf-text">Edit ${ts}${savesHtml}${intentBadge}</div>`
      +reasonHtml+snippetHtml
      +rewriteBlock(r)
      +'</div></div>';
  });

  // First-7-seconds warning
  if(M.first7_flagged){
    hasConfirmed=true;
    confirmedHtml+=`<div class="wf-row"><span class="wf-icon wf-warn">\u26a0</span>`
      +`<div><div class="wf-text">Move flagged content out of first 7 seconds</div></div></div>`;
  }

  html+=confirmedHtml;

  // ── Cleared false positives (collapsed, informational) ─
  const cleared=R.sentences.filter(s=>{
    const cc=s.context_check;
    return cc&&!cc.error&&cc.genuine_harm===false;
  });
  if(cleared.length){
    html+=`<div class="wf-section-lbl">\u2713 ${cleared.length} cleared by context check</div>`;
    cleared.forEach(s=>{
      const cc=s.context_check;
      html+=`<div class="wf-row">`
        +`<span class="wf-icon wf-pass">\u2713</span>`
        +`<div><div class="wf-text" style="color:var(--text2)">${fmt(s.start)} \u00b7 \u201c${s.text.slice(0,55)}\u2026\u201d`
        +`<span class="cc-intent">${cc.intent||''}</span></div>`
        +`<div class="wf-sub">Was ${s.toxicity.toFixed(2)} \u2192 adjusted ${cc.adjusted_score.toFixed(2)} \u00b7 ${cc.reason||''}</div>`
        +'</div></div>';
    });
  }

  // ── Flagged sentences summary (no context check) ─
  if(!hasCc){
    const flagged=R.sentences.filter(s=>s.toxicity>=0.4);
    if(flagged.length>0){
      const maxTs=Math.max(...flagged.map(s=>s.start));
      const mins=Math.ceil(maxTs/60);
      const suffix=maxTs<120?` \u2192 all in first ${mins} minute${mins>1?'s':''}`:` \u2192 last at ${fmt(maxTs)}`;
      html+=`<div class="wf-row"><span class="wf-icon wf-info">\u00b7</span>`
        +`<div><div class="wf-text">${flagged.length} sentence${flagged.length>1?'s':''} flagged${suffix}</div></div></div>`;
    }
  }

  // ── Title reminder ─
  if(R.youtube&&R.youtube.title&&rl!=='LOW'){
    html+=`<div class="wf-row"><span class="wf-icon wf-edit">\u2192</span>`
      +`<div><div class="wf-text">Review title for ad safety \u2014 <span style="font-family:var(--mono);font-size:.78rem;color:var(--muted)">toxc check "your title"</span></div></div></div>`;
  }

  // ── Pass message ─
  if(!html.trim()||(!hasConfirmed&&!cleared.length&&!R.sentences.some(s=>s.toxicity>=0.4))){
    html+=`<div class="wf-row"><span class="wf-icon wf-pass">\u2713</span>`
      +`<div><div class="wf-text">No edits needed \u2014 safe to upload</div></div></div>`;
  }

  return`<div class="section" id="sec-fix">`
    +`<div class="section-hdr">What to Fix</div>`
    +`<div class="recs-card" style="margin-bottom:0">${html}</div>`
    +`</div>`;
}

/* ── Signals & Recommendations ────────────────────────── */
function renderSignalsRecs(R){
  const M=R.monetization||{};
  const signals=M.signals||[];
  if(!signals.length)return'';

  const TIER1=['hate_speech','threats','severe'];
  const TIER2=['profanity'];
  const t1=signals.filter(s=>TIER1.includes(s.signal));
  const t2=signals.filter(s=>TIER2.includes(s.signal));
  const t3=signals.filter(s=>!TIER1.includes(s.signal)&&!TIER2.includes(s.signal));

  function sigRow(s){
    const valHtml=s.value>0?`<span class="sig-val">${s.value.toFixed(3)}</span>`:'';
    return`<div class="sig-full-row"><span>${s.label}</span>${valHtml}</div>`;
  }

  function tier(cls,label,rows){
    if(!rows.length)return'';
    return`<div class="sig-tier ${cls}"><div class="sig-tier-hdr">${label}</div>${rows.map(sigRow).join('')}</div>`;
  }

  return'<div class="section" id="sec-signals">'
    +'<div class="section-hdr">Risk Signals</div>'
    +tier('sig-tier-high','\u26a0 Instant demonetization',t1)
    +tier('sig-tier-med','\u00b7 Limited ads (yellow icon)',t2)
    +tier('sig-tier-pat','Pattern & context',t3)
    +'</div>';
}

/* ── Timeline ─────────────────────────────────────────── */
function renderTimeline(R){
  const dur=R.duration||1;
  const bars=R.sentences.map(function(s,i){
    const w=((s.end-s.start)/dur)*100;
    const op=Math.max(.12,Math.min(s.toxicity*1.3,.95));
    return'<div class="tl-bar" style="width:'+Math.max(w,.25)+'%;background:'+tc(s.toxicity)+';opacity:'+op.toFixed(2)+'" data-idx="'+i+'" onclick="scrollToSent('+i+')"></div>';
  }).join('');

  const zone7=dur>7?'<div class="tl-zone7" style="width:'+((7/dur)*100).toFixed(2)+'%"></div>':'';

  const labels=[0,.25,.5,.75,1].map(function(t){return'<span>'+fmt(t*dur)+'</span>'}).join('');

  return'<details class="acc" id="sec-tl" open>'
    +'<summary>Timeline'+(dur>7?' <span style="font-size:.6rem;opacity:.5;font-family:var(--mono);margin-left:.4rem">\u258f= first 7s</span>':'')
    +'<span class="acc-toggle">+</span></summary>'
    +'<div class="acc-body"><div class="tl-wrap">'
    +'<div class="tl-bars-outer">'+zone7+'<div class="tl-bars">'+bars+'</div></div>'
    +'<div class="tl-labels">'+labels+'</div>'
    +'<div class="tl-legend">'
    +'<span><i style="background:var(--red)"></i> Toxic (\u22650.7)</span>'
    +'<span><i style="background:var(--yel)"></i> Borderline</span>'
    +'<span><i style="background:var(--grn)"></i> Clean</span>'
    +'</div>'
    +'</div></div></details>';
}

/* ── Smooth SVG path (Catmull-Rom) ─────────────────────── */
function smoothD(pts,xk,yk){
  if(pts.length<2)return'';
  var d='M '+pts[0][xk].toFixed(1)+' '+pts[0][yk].toFixed(1);
  if(pts.length===2)return d+' L '+pts[1][xk].toFixed(1)+' '+pts[1][yk].toFixed(1);
  for(var i=1;i<pts.length;i++){
    var p0=pts[Math.max(0,i-2)],p1=pts[i-1],p2=pts[i],p3=pts[Math.min(pts.length-1,i+1)];
    var c1x=p1[xk]+(p2[xk]-p0[xk])/6,c1y=p1[yk]+(p2[yk]-p0[yk])/6;
    var c2x=p2[xk]-(p3[xk]-p1[xk])/6,c2y=p2[yk]-(p3[yk]-p1[yk])/6;
    d+=' C '+c1x.toFixed(1)+' '+c1y.toFixed(1)+','+c2x.toFixed(1)+' '+c2y.toFixed(1)+','+p2[xk].toFixed(1)+' '+p2[yk].toFixed(1);
  }
  return d;
}

/* ── Line Chart (Toxicity & Sentiment) ────────────────── */
function renderLineChart(R){
  var W=600,H=200,P={t:18,r:48,b:28,l:38};
  var iW=W-P.l-P.r,iH=H-P.t-P.b,dur=R.duration||1;

  var pts=R.sentences.map(function(s){
    var mid=(s.start+s.end)/2;
    return{x:P.l+(mid/dur)*iW,ty:P.t+(1-s.toxicity)*iH,sy:P.t+(1-(s.sentiment+1)/2)*iH};
  });

  var toxD=smoothD(pts,'x','ty');
  var senD=smoothD(pts,'x','sy');
  var areaD=toxD+' L '+pts[pts.length-1].x.toFixed(1)+' '+(P.t+iH)+' L '+pts[0].x.toFixed(1)+' '+(P.t+iH)+' Z';

  var grid='';
  [0,.25,.5,.75,1].forEach(function(v){
    var y=P.t+(1-v)*iH;
    grid+='<line x1="'+P.l+'" y1="'+y.toFixed(1)+'" x2="'+(W-P.r)+'" y2="'+y.toFixed(1)+'" stroke="var(--border)" stroke-width="0.5"/>';
    grid+='<text x="'+(P.l-5)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" fill="var(--muted)" font-size="7.5">'+v.toFixed(1)+'</text>';
    var sv=v*2-1;grid+='<text x="'+(W-P.r+5)+'" y="'+(y+3).toFixed(1)+'" text-anchor="start" fill="var(--muted)" font-size="7.5">'+(sv>=0?'+':'')+sv.toFixed(1)+'</text>';
  });

  var yT=P.t+(1-.7)*iH,yB=P.t+(1-.4)*iH;
  var thresh='<line x1="'+P.l+'" y1="'+yT.toFixed(1)+'" x2="'+(W-P.r)+'" y2="'+yT.toFixed(1)+'" stroke="var(--red)" stroke-width=".7" stroke-dasharray="4,4" opacity=".35"/>';
  thresh+='<line x1="'+P.l+'" y1="'+yB.toFixed(1)+'" x2="'+(W-P.r)+'" y2="'+yB.toFixed(1)+'" stroke="var(--yel)" stroke-width=".7" stroke-dasharray="4,4" opacity=".35"/>';

  var xTicks='';
  [0,.25,.5,.75,1].forEach(function(t){
    xTicks+='<text x="'+(P.l+t*iW).toFixed(1)+'" y="'+(P.t+iH+14)+'" text-anchor="middle" fill="var(--muted)" font-size="7.5">'+fmt(t*dur)+'</text>';
  });

  var dots=pts.map(function(p){
    return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.ty.toFixed(1)+'" r="2.5" fill="var(--red)" opacity=".6"/>';
  }).join('');

  var lg='<g transform="translate('+(W-P.r-160)+','+(P.t-6)+')">'
    +'<line x1="0" y1="0" x2="14" y2="0" stroke="var(--red)" stroke-width="2"/><text x="18" y="3" fill="var(--text2)" font-size="7.5">Toxicity</text>'
    +'<line x1="72" y1="0" x2="86" y2="0" stroke="var(--blu)" stroke-width="1.5" stroke-dasharray="3,2"/><text x="90" y="3" fill="var(--text2)" font-size="7.5">Sentiment</text></g>';

  return'<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible">'+grid+thresh+xTicks
    +'<path d="'+areaD+'" fill="var(--red)" opacity=".05"/>'
    +'<path d="'+toxD+'" fill="none" stroke="var(--red)" stroke-width="1.8" stroke-linejoin="round"/>'
    +'<path d="'+senD+'" fill="none" stroke="var(--blu)" stroke-width="1.3" stroke-linejoin="round" stroke-dasharray="4,3"/>'
    +dots+lg+'</svg>';
}

/* ── Score Distribution ───────────────────────────────── */
function renderDistribution(R){
  var bk=new Array(10).fill(0);
  R.sentences.forEach(function(s){bk[Math.min(Math.floor(s.toxicity*10),9)]++});
  var mx=Math.max.apply(null,bk)||1;
  return'<div class="dist">'+bk.map(function(c,i){
    var h=(c/mx)*100;
    var cl=i>=7?'var(--red)':i>=4?'var(--yel)':'var(--grn)';
    return'<div class="dist-col"><div class="dist-count">'+(c||'')+'</div><div class="dist-bar-wrap"><div class="dist-bar" style="height:'+h+'%;background:'+cl+'"></div></div><div class="dist-label">'+(i/10).toFixed(1)+'</div></div>';
  }).join('')+'</div>';
}

/* ── Charts Section ───────────────────────────────────── */
function renderCharts(R){
  return'<details class="acc" id="sec-charts" open>'
    +'<summary>Analysis<span class="acc-toggle">+</span></summary>'
    +'<div class="acc-body"><div class="charts-grid">'
    +'<div class="chart-card"><div class="chart-title">Toxicity &amp; Sentiment Over Time</div>'+renderLineChart(R)+'</div>'
    +'<div class="chart-card"><div class="chart-title">Score Distribution</div>'+renderDistribution(R)+'</div>'
    +'</div></div></details>';
}

/* ── Dimension Heatmap ────────────────────────────────── */
function renderHeatmap(R){
  if(R.fast)return'';
  var dl={insult:'Insult',obscene:'Obscene',threat:'Threat',identity_attack:'Identity',severe_toxicity:'Severe'};
  var dk=['insult','obscene','threat','identity_attack','severe_toxicity'];
  var n=R.sentences.length;

  var rows=dk.map(function(dim){
    var cells=R.sentences.map(function(s,i){
      var v=(s.dimensions||{})[dim]||0;
      var op=v<.01?.08:(.15+v*.85);
      return'<div class="hm-cell" style="background:'+tc(v)+';opacity:'+op.toFixed(2)+'" data-dim="'+dim+'" data-idx="'+i+'" onclick="scrollToSent('+i+')"></div>';
    }).join('');
    return'<div class="hm-row"><div class="hm-label">'+(dl[dim]||dim)+'</div><div class="hm-cells">'+cells+'</div></div>';
  }).join('');

  var step=Math.max(1,Math.floor(n/6));
  var timeLbls=R.sentences.filter(function(_,i){return i%step===0||i===n-1}).map(function(s){
    return'<span>'+fmt(s.start)+'</span>';
  }).join('');

  return'<details class="acc" id="sec-hm" open>'
    +'<summary>Dimension Heatmap<span class="acc-toggle">+</span></summary>'
    +'<div class="acc-body"><div class="hm-wrap">'+rows
    +'<div class="hm-time-labels">'+timeLbls+'</div>'
    +'<div class="hm-legend"><span>Low</span><div class="hm-legend-bar"></div><span>High</span></div>'
    +'</div></div></details>';
}

/* ── Moment Cards ─────────────────────────────────────── */
function renderMoments(R){
  const isFast=R.fast;
  const top_toxic=R.top_toxic||[...R.sentences].sort(function(a,b){return b.toxicity-a.toxicity}).slice(0,5);
  const cards=top_toxic.filter(function(s){return s.toxicity>0}).slice(0,5).map(function(s,i){
    const idx=s.idx!=null?s.idx:R.sentences.findIndex(function(x){return x.start===s.start&&x.text===s.text});
    const color=tc(s.toxicity);
    let chips='';
    if(!isFast&&s.dimensions){
      const dimLabels={insult:'Insult',obscene:'Obscene',threat:'Threat',identity_attack:'Identity',severe_toxicity:'Severe'};
      chips=Object.entries(s.dimensions)
        .sort(function(a,b){return b[1]-a[1]})
        .map(function(e){
          const k=e[0],v=e[1];
          const bg=v>=.7?'var(--red-d)':v>=.4?'var(--yel-d)':'var(--grn-d)';
          return'<span class="chip" style="background:'+bg+';color:'+tc(v)+'">'+(dimLabels[k]||k)+' '+v.toFixed(2)+'</span>';
        }).join('');
    }
    const bc=s.toxicity>=.7?'var(--red)':s.toxicity>=.4?'var(--yel)':'var(--grn)';
    const adjTox=s.adjusted_toxicity!=null?s.adjusted_toxicity:s.toxicity;
    const adjColor=tc(adjTox);
    const cc=s.context_check;
    let ccBadge='';
    if(cc&&!cc.error){
      if(cc.genuine_harm===false) ccBadge='<span class="cc-cleared">\u2713 Cleared \u00b7 '+cc.intent+'</span>';
      else ccBadge='<span class="cc-confirmed">\u26a0 Confirmed</span>';
    }
    let mcRewrite='';
    if(cc&&!cc.error&&cc.safe_rewrite){
      mcRewrite='<div class="rewrite-block">'
        +(cc.safe_rewrite?'<div class="rewrite-row"><span class="rewrite-label">Safe</span><span class="rewrite-text">\u201c'+cc.safe_rewrite+'\u201d</span></div>':'')
        +(cc.alt_rewrite ?'<div class="rewrite-row"><span class="rewrite-label">Alt</span><span class="rewrite-text">\u201c'+cc.alt_rewrite+'\u201d</span></div>':'')
        +'</div>';
    }
    return'<div class="mc" onclick="scrollToSent('+idx+')" style="border-left-color:'+bc+'">'
      +'<div class="mc-rank" style="color:'+adjColor+'">'+(i+1)+'</div>'
      +'<div class="mc-body">'
      +'<div class="mc-top">'
      +'<span class="mc-score" style="color:'+adjColor+'">'+adjTox.toFixed(2)+'</span>'
      +(adjTox!==s.toxicity?'<span style="font-size:.65rem;color:var(--muted);font-family:var(--mono)">(raw '+s.toxicity.toFixed(2)+')</span>':'')
      +'<span class="mc-time">'+fmt(s.start)+'</span>'
      +'<span class="mc-verdict" style="color:'+vc(s.verdict)+'">'+s.verdict+'</span>'
      +(ccBadge?ccBadge:'')
      +'</div>'
      +'<div class="mc-text">'+s.text+'</div>'
      +(chips?'<div class="mc-chips">'+chips+'</div>':'')
      +mcRewrite
      +'</div></div>';
  }).join('');

  return'<details class="acc" id="sec-mom" open>'
    +'<summary>Top Toxic Moments<span class="acc-toggle">+</span></summary>'
    +'<div class="acc-body"><div class="moments">'+cards+'</div></div></details>';
}

/* ── Sentences Table ──────────────────────────────────── */
function renderSentences(R){
  function rows(hasCtx){
    return R.sentences.map(function(s,i){
      const adjTox=s.adjusted_toxicity!=null?s.adjusted_toxicity:s.toxicity;
      const color=tc(adjTox);
      const cc=s.context_check;
      let ctxCell='';
      if(hasCtx){
        if(cc&&!cc.error){
          if(cc.genuine_harm===false) ctxCell='<td><span class="cc-cleared">\u2713 Cleared</span> <span class="cc-intent">'+cc.intent+'</span></td>';
          else ctxCell='<td><span class="cc-confirmed">\u26a0 Confirmed</span></td>';
        } else {
          ctxCell='<td style="color:var(--muted);font-size:.7rem">—</td>';
        }
      }
      let scoreCell='<td class="col-score"><span style="color:'+color+'">'+adjTox.toFixed(2)+'</span>'+mbar(adjTox,color);
      if(cc&&!cc.error&&cc.genuine_harm===false) scoreCell+=' <span style="font-size:.6rem;color:var(--muted);font-family:var(--mono)">(was '+s.toxicity.toFixed(2)+')</span>';
      scoreCell+='</td>';
      return'<tr id="sent-'+i+'">'
        +'<td class="col-time" onclick="scrollToSent('+i+')">'+fmt(s.start)+'</td>'
        +'<td class="col-text">'+s.text+'</td>'
        +scoreCell
        +ctxCell
        +'<td class="col-sent" style="color:'+sc(s.sentiment)+'">'+sign(s.sentiment)+'</td>'
        +'<td class="col-verd" style="color:'+vc(s.verdict)+'">'+s.verdict+'</td></tr>';
    }).join('');
  }

  const hasCtx=R.sentences.some(s=>s.context_check);
  return'<div class="section" id="sec-all">'
    +'<div class="section-hdr">All Sentences</div>'
    +'<div class="s-table-wrap"><table class="s-table"><thead><tr>'
    +'<th>Time</th><th>Text</th><th>Toxicity</th>'
    +(hasCtx?'<th>Context</th>':'')
    +'<th>Sentiment</th><th>Verdict</th>'
    +'</tr></thead><tbody>'+rows(hasCtx)+'</tbody></table></div></div>';
}

/* ── Main Render ──────────────────────────────────────── */
function render(){
  const R=REPORT;
  if(!R||!R.sentences||!R.sentences.length){
    document.getElementById('root').innerHTML='<div style="padding:3rem;color:var(--muted)">No data.</div>';
    return;
  }
  const isFast=R.fast;
  const modelLabel='whisper-'+R.model+' \u00b7 '+(isFast?'vader':'toxic-bert');
  const displayTitle=(R.youtube&&R.youtube.title)?R.youtube.title:R.audio;
  document.title='toxc \u00b7 '+displayTitle;

  const saved=localStorage.getItem('toxc-theme');
  if(saved)document.documentElement.dataset.theme=saved;

  const ytThumb=R.youtube&&R.youtube.thumbnail
    ?'<img class="yt-thumb" src="'+R.youtube.thumbnail+'" alt="">'
    :'';
  const ytChannel=R.youtube&&R.youtube.channel
    ?'<div class="yt-channel">'+R.youtube.channel+'</div>'
    :'';

  const hdr='<div class="main-hdr"><h1>'+displayTitle+'</h1>'
    +(ytThumb||ytChannel?ytThumb+ytChannel:'')
    +'<div class="meta">'+fmt(R.duration)+' \u00b7 '+R.overall.sentence_count+' sentences \u00b7 '+modelLabel+(R.analyzed_at?' \u00b7 '+R.analyzed_at:'')+'</div></div>';

  const tabBar='<div class="tab-bar">'
    +'<button class="tab-btn active" data-tab="overview" onclick="switchTab(\'overview\')">Overview</button>'
    +'<button class="tab-btn" data-tab="viz" onclick="switchTab(\'viz\')">Visualizations</button>'
    +'<button class="tab-btn" data-tab="transcript" onclick="switchTab(\'transcript\')">Transcript</button>'
    +'</div>';

  const overviewPanel=renderChannelProfile(R)+renderFinancialImpact(R)+renderConsequenceBreakdown(R)+renderWhatToFix(R)+renderSignalsRecs(R);
  const vizPanel=renderTimeline(R)+renderCharts(R)+renderHeatmap(R)+renderMoments(R);
  const transcriptPanel=renderSentences(R);

  const panels=`<div class="tab-panel active" id="tab-overview">${overviewPanel}</div>`
    +`<div class="tab-panel" id="tab-viz">${vizPanel}</div>`
    +`<div class="tab-panel" id="tab-transcript">${transcriptPanel}</div>`;

  const sidebar=renderSidebar(R);
  const main='<div class="main">'+hdr+renderHero(R)+tabBar+panels+'</div>';
  document.getElementById('root').innerHTML='<div class="layout">'+sidebar+main+'</div>';

  updIcon();
  setupTips(R);
  setupActive(R);
}

/* ── Tooltips ─────────────────────────────────────────── */
function setupTips(R){
  const tip=document.getElementById('tip');
  document.querySelectorAll('.tl-bar').forEach(function(el){
    el.addEventListener('mousemove',function(e){
      const i=+el.dataset.idx,s=R.sentences[i];
      const preview=s.text.length>80?s.text.slice(0,80)+'\u2026':s.text;
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML='<span style="color:'+tc(s.toxicity)+';font-weight:700">'+s.toxicity.toFixed(2)+'</span> \u00b7 <span style="color:var(--muted)">'+fmt(s.start)+'</span><br><span style="color:var(--text2)">'+preview+'</span>';
    });
    el.addEventListener('mouseleave',function(){tip.style.display='none'});
  });
  const dl={insult:'Insult',obscene:'Obscene',threat:'Threat',identity_attack:'Identity',severe_toxicity:'Severe'};
  document.querySelectorAll('.hm-cell').forEach(function(el){
    el.addEventListener('mousemove',function(e){
      const i=+el.dataset.idx,dim=el.dataset.dim,s=R.sentences[i];
      const v=(s.dimensions||{})[dim]||0;
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
      const prev=s.text.length>55?s.text.slice(0,55)+'\u2026':s.text;
      tip.innerHTML='<span style="font-weight:700;color:'+tc(v)+'">'+v.toFixed(3)+'</span> '+(dl[dim]||dim)+'<br><span style="color:var(--muted)">'+fmt(s.start)+' \u2014 '+prev+'</span>';
    });
    el.addEventListener('mouseleave',function(){tip.style.display='none'});
  });
}

/* ── Active State Tracking ────────────────────────────── */
function setupActive(R){
  const secs=['sec-channel','sec-finance','sec-consequence','sec-fix','sec-signals','sec-tl','sec-charts','sec-hm','sec-mom','sec-all'];
  const secObs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        document.querySelectorAll('.nav-link').forEach(function(el){el.classList.remove('active')});
        const link=document.querySelector('.nav-link[data-sec="'+entry.target.id+'"]');
        if(link)link.classList.add('active');
      }
    });
  },{threshold:.15,rootMargin:'-10% 0px -60% 0px'});
  secs.forEach(function(id){const el=document.getElementById(id);if(el)secObs.observe(el)});

  const momObs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      const idx=entry.target.id.replace('sent-','');
      const link=document.querySelector('.ml[data-midx="'+idx+'"]');
      if(link){
        if(entry.isIntersecting)link.classList.add('active');
        else link.classList.remove('active');
      }
    });
  },{threshold:.5});

  const top_toxic=R.top_toxic||[...R.sentences].sort(function(a,b){return b.toxicity-a.toxicity}).slice(0,5);
  top_toxic.forEach(function(s){
    const idx=s.idx!=null?s.idx:R.sentences.findIndex(function(x){return x.start===s.start&&x.text===s.text});
    const el=document.getElementById('sent-'+idx);
    if(el)momObs.observe(el);
  });
}

window.onload=render;
</script>
